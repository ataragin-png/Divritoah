<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>דברי תורה — אשר טרגין</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700&family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="cv.css" />
    <style>
      /* ── Add button ── */
      .add-bar {
        display: flex;
        justify-content: center;
        margin-bottom: 40px;
      }

      .btn-add {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--gold);
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 12px 28px;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 17px;
        font-weight: 500;
        cursor: pointer;
        box-shadow: 0 2px 10px rgba(184,134,58,0.25);
        transition: background 0.2s, box-shadow 0.2s;
      }
      .btn-add:hover {
        background: var(--gold-light);
        box-shadow: 0 4px 16px rgba(184,134,58,0.35);
      }
      .btn-add .plus { font-size: 22px; line-height: 1; }

      /* ── Modal overlay ── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(44,31,14,0.45);
        z-index: 100;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal-overlay.open { display: flex; }

      .modal {
        background: var(--cream);
        border-radius: 8px;
        padding: 36px 32px 28px;
        width: 100%;
        max-width: 560px;
        box-shadow: 0 12px 48px rgba(44,31,14,0.25);
        position: relative;
        max-height: 90vh;
        overflow-y: auto;
      }

      .modal-title {
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 24px;
      }

      .modal-close {
        position: absolute;
        top: 16px;
        left: 16px;
        background: none;
        border: none;
        font-size: 22px;
        color: var(--ink-muted);
        cursor: pointer;
        line-height: 1;
        padding: 4px;
      }
      .modal-close:hover { color: var(--ink); }

      /* ── Form fields ── */
      .field {
        margin-bottom: 18px;
      }
      .field label {
        display: block;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 14px;
        font-weight: 500;
        color: var(--ink-muted);
        margin-bottom: 6px;
      }
      .field input,
      .field textarea {
        width: 100%;
        background: #fff;
        border: 1.5px solid var(--border);
        border-radius: 4px;
        padding: 10px 14px;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 16px;
        color: var(--ink);
        outline: none;
        transition: border-color 0.2s;
        resize: vertical;
      }
      .field input:focus,
      .field textarea:focus {
        border-color: var(--gold);
      }
      .field textarea {
        min-height: 160px;
      }

      .modal-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 24px;
      }
      .btn-cancel {
        background: transparent;
        border: 1.5px solid var(--border);
        border-radius: 4px;
        padding: 10px 22px;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 16px;
        color: var(--ink-muted);
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .btn-cancel:hover { border-color: var(--ink-muted); }

      .btn-save {
        background: var(--gold);
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 10px 28px;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-save:hover { background: var(--gold-light); }

      /* ── Delete button on each entry ── */
      .torah-entry {
        position: relative;
      }
      .btn-delete {
        position: absolute;
        top: 0;
        left: 0;
        background: none;
        border: none;
        color: var(--border);
        font-size: 18px;
        cursor: pointer;
        padding: 4px;
        line-height: 1;
        transition: color 0.2s;
      }
      .btn-delete:hover { color: #c0392b; }
    </style>
  </head>
  <body>
    <div class="bg-texture"></div>

    <header class="site-header">
      <nav>
        <a href="index.html" class="back-link">← חזרה</a>
        <span class="nav-name">א.ת</span>
      </nav>
    </header>

    <main class="cv-main">
      <div class="cv-container">

        <div class="cv-header">
          <div class="photo-frame">
            <img src="photo.jpg" alt="אשר טרגין" class="hero-photo" />
          </div>
          <h1 class="cv-name">דברי תורה</h1>
          <p class="cv-name-en">Torah Teachings</p>
          <div class="divider"></div>
          <p class="cv-meta">הרב ד"ר עו"ד אשר טרגין</p>
        </div>

        <!-- Add button -->
        <div class="add-bar">
          <button class="btn-add" onclick="openModal()">
            <span class="plus">+</span> הוסף דבר תורה
          </button>
        </div>

        <!-- Entries render here -->
        <div id="torah-list"></div>

      </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <button class="modal-close" onclick="closeModal()" aria-label="סגור">✕</button>
        <h2 class="modal-title">דבר תורה חדש</h2>

        <div class="field">
          <label for="f-title">כותרת</label>
          <input type="text" id="f-title" placeholder="למשל: ויצא — כח הדיבור" />
        </div>
        <div class="field">
          <label for="f-meta">פרשה / תאריך</label>
          <input type="text" id="f-meta" placeholder='למשל: פרשת ויצא · תשפ"ו' />
        </div>
        <div class="field">
          <label for="f-body">תוכן</label>
          <textarea id="f-body" placeholder="כתוב כאן את דבר התורה..."></textarea>
        </div>

        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">ביטול</button>
          <button class="btn-save" onclick="saveEntry()">שמור</button>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Asher Taragin</p>
    </footer>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();

      const STORAGE_KEY = 'divrei-torah';

      function load() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
        catch { return []; }
      }

      function save(entries) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      }

      function render() {
        const entries = load();
        const list = document.getElementById('torah-list');

        if (entries.length === 0) {
          list.innerHTML = `
            <div class="torah-placeholder">
              <div class="placeholder-icon">✦</div>
              <p>לחץ על הכפתור למעלה כדי להוסיף את הדבר תורה הראשון</p>
            </div>`;
          return;
        }

        list.innerHTML = entries.map((e, i) => `
          <article class="torah-entry">
            <button class="btn-delete" onclick="deleteEntry(${i})" title="מחק">✕</button>
            <h2 class="torah-title">${escHtml(e.title)}</h2>
            ${e.meta ? `<p class="torah-meta">${escHtml(e.meta)}</p>` : ''}
            <div class="torah-body">
              ${e.body.split('\n').filter(l => l.trim()).map(l => `<p>${escHtml(l)}</p>`).join('')}
            </div>
          </article>
        `).join('');
      }

      function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      function openModal() {
        document.getElementById('f-title').value = '';
        document.getElementById('f-meta').value = '';
        document.getElementById('f-body').value = '';
        document.getElementById('modal').classList.add('open');
        document.getElementById('f-title').focus();
      }

      function closeModal() {
        document.getElementById('modal').classList.remove('open');
      }

      function saveEntry() {
        const title = document.getElementById('f-title').value.trim();
        const meta  = document.getElementById('f-meta').value.trim();
        const body  = document.getElementById('f-body').value.trim();

        if (!title || !body) {
          alert('נא למלא כותרת ותוכן.');
          return;
        }

        const entries = load();
        entries.unshift({ title, meta, body });
        save(entries);
        closeModal();
        render();
      }

      function deleteEntry(i) {
        if (!confirm('למחוק את הדבר תורה הזה?')) return;
        const entries = load();
        entries.splice(i, 1);
        save(entries);
        render();
      }

      // Close modal on overlay click
      document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
      });

      render();
    </script>
  </body>
</html>
