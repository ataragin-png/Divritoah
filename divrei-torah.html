      /* ── Filter bar ── */
      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-bottom: 36px;
      }
      .filter-btn {
        padding: 7px 18px;
        border-radius: 20px;
        border: 1.5px solid var(--border);
        background: transparent;
        color: var(--ink-muted);
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
      .filter-btn.active {
        background: var(--gold);
        border-color: var(--gold);
        color: #fff;
      }

      /* ── Entry cards ── */
      .torah-grid { display: flex; flex-direction: column; gap: 12px; }

      .torah-card {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 18px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fff;
        transition: box-shadow 0.2s;
      }
      .torah-card:hover { box-shadow: 0 2px 12px rgba(184,134,58,0.12); }

      .card-icon { font-size: 26px; flex-shrink: 0; }

      .card-info { flex: 1; min-width: 0; }
      .card-title {
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 17px;
        font-weight: 500;
        color: var(--ink);
        margin-bottom: 3px;
      }
      .card-meta { font-size: 13px; color: var(--ink-muted); }
      .card-cat {
        display: inline-block;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        background: rgba(184,134,58,0.1);
        color: var(--gold);
        margin-top: 4px;
      }

      .btn-view {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: transparent;
        border: 1.5px solid var(--gold);
        color: var(--gold);
        border-radius: 4px;
        padding: 8px 18px;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s;
        flex-shrink: 0;
        white-space: nowrap;
      }
      .btn-view:hover { background: rgba(184,134,58,0.08); }

      /* ── Empty state ── */
      .empty-state {
        text-align: center;
        padding: 60px 24px;
        color: var(--ink-muted);
        font-family: 'Frank Ruhl Libre', serif;
      }
      .empty-icon { font-size: 36px; opacity: 0.4; margin-bottom: 14px; }
      .empty-state p { font-size: 18px; }
      .empty-state .sub { font-size: 14px; margin-top: 6px; }

      /* ── Admin link ── */
      .admin-bar {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 32px;
      }
      .btn-admin {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--gold);
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 11px 26px;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 2px 10px rgba(184,134,58,0.25);
        transition: background 0.2s;

        background: transparent;
        color: var(--gold);
        border: 1.5px solid var(--gold);
        box-shadow: none;

      .btn-admin-outline:hover { background: rgba(184,134,58,0.08); }
      .admin-only-btn { display: none; }

      .btn-admin-mode {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 15px;
        color: var(--border);
        padding: 4px 6px;
        border-radius: 4px;
        transition: color 0.2s;

        border: none;

      /* ── Count label ── */

        border: 1.5px solid var(--border);

        font-family: 'Frank Ruhl Libre', serif;

      .search-input::placeholder { color: var(--ink-muted); }
      .search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        pointer-events: none;
        opacity: 0.45;
      }
      .search-clear {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        background: none;
        border: none;
        cursor: pointer;

      let activeFilter = 'הכל';
      let activeQuery = '';

      function filter(cat) {
        activeFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.toggle('active', btn.textContent.trim() === cat);
        });
        render();
      }

      function onSearch(val) {
        activeQuery = val.trim();
        const icon  = document.getElementById('search-icon');
        const clear = document.getElementById('search-clear');
        icon.style.display  = activeQuery ? 'none'   : '';
        clear.style.display = activeQuery ? 'inline' : 'none';
        render();
      }

      function clearSearch() {
        document.getElementById('search-input').value = '';
        onSearch('');
      }

      function render() {
        const grid = document.getElementById('torah-grid');
        let list = activeFilter === 'הכל' ? FILES : FILES.filter(e => e.category === activeFilter);

        if (activeQuery) {
          const q = activeQuery.toLowerCase();
          list = list.filter(e =>
            e.title.toLowerCase().includes(q) ||
            (e.meta  || '').toLowerCase().includes(q) ||
            (e.category || '').toLowerCase().includes(q)
          );
        }

        // Update count label
        const countEl = document.getElementById('torah-count');
        if (countEl) {
          if (activeQuery) {
            countEl.textContent = list.length === 0 ? 'לא נמצאו תוצאות' : `נמצאו ${list.length} תוצאות`;
          } else if (activeFilter !== 'הכל') {
            countEl.textContent = `${list.length} דברי תורה ב${activeFilter}`;
          } else {
            countEl.textContent = `${FILES.length} דברי תורה`;
          }
        }

        if (list.length === 0) {
          const msg = activeQuery
            ? `לא נמצאו תוצאות עבור "${esc(activeQuery)}"`
            : activeFilter === 'הכל' ? 'דברי תורה יתווספו בקרוב' : 'אין דברי תורה בקטגוריה זו';
          grid.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">✦</div>
              <p>${msg}</p>
              ${activeQuery ? `<p class="sub"><button onclick="clearSearch()" style="background:none;border:none;color:var(--gold);cursor:pointer;font-family:inherit;font-size:14px;">נקה חיפוש</button></p>` : '<p class="sub">Torah teachings coming soon</p>'}
            </div>`;
          return;
        }

        grid.innerHTML = list.map(e => `
          <div class="torah-card">
            <div class="card-icon">📕</div>
            <div class="card-info">
              <div class="card-title">${esc(e.title)}</div>
              ${e.meta ? `<div class="card-meta">${esc(e.meta)}</div>` : ''}
              ${e.category ? `<span class="card-cat">${esc(e.category)}</span>` : ''}
            </div>
            <a class="btn-view" href="${esc(e.file)}" target="_blank" rel="noopener">📖 פתח</a>
            <button class="btn-remove" onclick="removeEntry('${e.file.replace(/'/g,"\\'")}', '${esc(e.title).replace(/'/g,"\\'")}')">🗑</button>
          </div>
        `).join('');
      }

      function toggleAdminMode() {
        if (document.body.classList.contains('admin-mode')) {
          document.body.classList.remove('admin-mode');
          sessionStorage.removeItem('adminMode');
          return;
        }
        const pw = prompt('הכנס סיסמת ניהול:');
        if (!pw) return;
        if (pw !== 'Torah613') { alert('❌ סיסמה שגויה'); return; }
        document.body.classList.add('admin-mode');
        sessionStorage.setItem('adminMode', '1');
      }

      // Restore admin mode if set in this session
      if (sessionStorage.getItem('adminMode') === '1') {
        document.body.classList.add('admin-mode');
      }

      async function removeEntry(filePath, title) {
        const pw = prompt('הכנס סיסמה להסרת הדבר תורה:');
        if (!pw) return;
        if (!confirm(`האם להסיר את "${title}"?`)) return;
        try {
          const fd = new FormData();
          fd.append('password', pw);
          fd.append('file', filePath);
          const r = await fetch('/api/remove', { method: 'POST', body: fd });
          const data = await r.json();
          if (data.success) {
            alert('✅ הדבר תורה הוסר בהצלחה!\nהאתר יתעדכן תוך 1–2 דקות.');
          } else {
            alert('❌ ' + data.error);
          }
        } catch(e) {
          alert('❌ שגיאת רשת — נסה שוב');
        }
      }

      function esc(s) {
        return String(s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      render();
    </script>
