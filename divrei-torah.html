<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>דברי תורה — אשר טרגין</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700&family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="cv.css" />
    <style>
      /* ── Add buttons bar ── */
      .add-bar {
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 40px;
      }

      .btn-add {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--gold);
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 12px 28px;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 17px;
        font-weight: 500;
        cursor: pointer;
        box-shadow: 0 2px 10px rgba(184,134,58,0.25);
        transition: background 0.2s, box-shadow 0.2s;
      }
      .btn-add:hover {
        background: var(--gold-light);
        box-shadow: 0 4px 16px rgba(184,134,58,0.35);
      }
      .btn-add.btn-outline {
        background: transparent;
        color: var(--gold);
        border: 1.5px solid var(--gold);
        box-shadow: none;
      }
      .btn-add.btn-outline:hover {
        background: rgba(184,134,58,0.08);
        box-shadow: none;
      }
      .btn-add .plus { font-size: 22px; line-height: 1; }

      /* ── Modal overlay ── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(44,31,14,0.45);
        z-index: 100;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal-overlay.open { display: flex; }

      .modal {
        background: var(--cream);
        border-radius: 8px;
        padding: 36px 32px 28px;
        width: 100%;
        max-width: 560px;
        box-shadow: 0 12px 48px rgba(44,31,14,0.25);
        position: relative;
        max-height: 90vh;
        overflow-y: auto;
      }

      .modal-title {
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 24px;
      }

      .modal-close {
        position: absolute;
        top: 16px;
        left: 16px;
        background: none;
        border: none;
        font-size: 22px;
        color: var(--ink-muted);
        cursor: pointer;
        line-height: 1;
        padding: 4px;
      }
      .modal-close:hover { color: var(--ink); }

      /* ── Form fields ── */
      .field { margin-bottom: 18px; }
      .field label {
        display: block;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 14px;
        font-weight: 500;
        color: var(--ink-muted);
        margin-bottom: 6px;
      }
      .field input[type="text"],
      .field textarea {
        width: 100%;
        background: #fff;
        border: 1.5px solid var(--border);
        border-radius: 4px;
        padding: 10px 14px;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 16px;
        color: var(--ink);
        outline: none;
        transition: border-color 0.2s;
        resize: vertical;
      }
      .field input[type="text"]:focus,
      .field textarea:focus { border-color: var(--gold); }
      .field textarea { min-height: 160px; }

      /* File upload zone */
      .file-zone {
        border: 2px dashed var(--border);
        border-radius: 6px;
        padding: 28px 16px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        background: #fff;
        position: relative;
      }
      .file-zone:hover, .file-zone.drag { border-color: var(--gold); background: rgba(184,134,58,0.04); }
      .file-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
      .file-zone-icon { font-size: 32px; margin-bottom: 8px; }
      .file-zone-text {
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 15px;
        color: var(--ink-muted);
      }
      .file-zone-text strong { color: var(--gold); }
      .file-zone-name {
        margin-top: 10px;
        font-size: 14px;
        color: var(--ink);
        font-weight: 500;
        display: none;
      }

      .modal-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 24px;
      }
      .btn-cancel {
        background: transparent;
        border: 1.5px solid var(--border);
        border-radius: 4px;
        padding: 10px 22px;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 16px;
        color: var(--ink-muted);
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .btn-cancel:hover { border-color: var(--ink-muted); }
      .btn-save {
        background: var(--gold);
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 10px 28px;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-save:hover { background: var(--gold-light); }

      /* ── Delete button on each entry ── */
      .torah-entry, .doc-entry { position: relative; }
      .btn-delete {
        position: absolute;
        top: 0;
        left: 0;
        background: none;
        border: none;
        color: var(--border);
        font-size: 18px;
        cursor: pointer;
        padding: 4px;
        line-height: 1;
        transition: color 0.2s;
      }
      .btn-delete:hover { color: #c0392b; }

      /* ── Documents section ── */
      .section-divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 40px 0 28px;
      }
      .section-divider h2 {
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--gold);
        white-space: nowrap;
      }
      .section-divider::before,
      .section-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .doc-entry {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 16px 14px 40px;
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 12px;
        background: #fff;
      }
      .doc-icon {
        font-size: 28px;
        flex-shrink: 0;
      }
      .doc-info { flex: 1; min-width: 0; }
      .doc-title {
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 17px;
        font-weight: 500;
        color: var(--ink);
        margin-bottom: 2px;
      }
      .doc-meta {
        font-size: 13px;
        color: var(--ink-muted);
      }
      .btn-download {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: transparent;
        border: 1.5px solid var(--gold);
        color: var(--gold);
        border-radius: 4px;
        padding: 7px 16px;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s;
        flex-shrink: 0;
      }
      .btn-download:hover { background: rgba(184,134,58,0.08); }
    </style>
  </head>
  <body>
    <div class="bg-texture"></div>

    <header class="site-header">
      <nav>
        <a href="index.html" class="back-link">← חזרה</a>
        <span class="nav-name">א.ת</span>
      </nav>
    </header>

    <main class="cv-main">
      <div class="cv-container">

        <div class="cv-header">
          <div class="photo-frame">
            <img src="photo.jpg" alt="אשר טרגין" class="hero-photo" />
          </div>
          <h1 class="cv-name">דברי תורה</h1>
          <p class="cv-name-en">Torah Teachings</p>
          <div class="divider"></div>
          <p class="cv-meta">הרב ד"ר עו"ד אשר טרגין</p>
        </div>

        <!-- Action buttons -->
        <div class="add-bar">
          <button class="btn-add" onclick="openTextModal()">
            <span class="plus">+</span> הוסף דבר תורה
          </button>
          <button class="btn-add btn-outline" onclick="downloadTorahEntries()">
            ⬇ הורד דברי תורה
          </button>
          <button class="btn-add btn-outline" onclick="openDocModal()">
            <span class="plus">+</span> הוסף מסמך
          </button>
        </div>

        <!-- Text entries -->
        <div id="torah-list"></div>

        <!-- Documents section -->
        <div id="docs-section" style="display:none">
          <div class="section-divider"><h2>מסמכים</h2></div>
          <div id="docs-list"></div>
        </div>

      </div>
    </main>

    <!-- Text entry modal -->
    <div class="modal-overlay" id="modal-text">
      <div class="modal">
        <button class="modal-close" onclick="closeModal('modal-text')" aria-label="סגור">✕</button>
        <h2 class="modal-title">דבר תורה חדש</h2>
        <div class="field">
          <label for="f-title">כותרת</label>
          <input type="text" id="f-title" placeholder="למשל: ויצא — כח הדיבור" />
        </div>
        <div class="field">
          <label for="f-meta">פרשה / תאריך</label>
          <input type="text" id="f-meta" placeholder='למשל: פרשת ויצא · תשפ"ו' />
        </div>
        <div class="field">
          <label for="f-body">תוכן</label>
          <textarea id="f-body" placeholder="כתוב כאן את דבר התורה..."></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal('modal-text')">ביטול</button>
          <button class="btn-save" onclick="saveTextEntry()">שמור</button>
        </div>
      </div>
    </div>

    <!-- Document modal -->
    <div class="modal-overlay" id="modal-doc">
      <div class="modal">
        <button class="modal-close" onclick="closeModal('modal-doc')" aria-label="סגור">✕</button>
        <h2 class="modal-title">הוספת מסמך</h2>
        <div class="field">
          <label for="d-title">שם המסמך</label>
          <input type="text" id="d-title" placeholder="למשל: שו"ת — פיקוח נפש בשבת" />
        </div>
        <div class="field">
          <label for="d-meta">תיאור / תאריך (אופציונלי)</label>
          <input type="text" id="d-meta" placeholder='למשל: תשפ"ו' />
        </div>
        <div class="field">
          <label>קובץ (PDF או Word)</label>
          <div class="file-zone" id="file-zone">
            <input type="file" id="d-file" accept=".pdf,.doc,.docx" onchange="onFileChosen(this)" />
            <div class="file-zone-icon">📄</div>
            <div class="file-zone-text">גרור קובץ לכאן או <strong>לחץ לבחירה</strong></div>
            <div class="file-zone-name" id="file-name"></div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal('modal-doc')">ביטול</button>
          <button class="btn-save" onclick="saveDocEntry()">שמור</button>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Asher Taragin</p>
    </footer>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();

      const TEXT_KEY = 'divrei-torah';
      const DOCS_KEY = 'divrei-torah-docs';

      /* ── Storage helpers ── */
      function loadText() {
        try { return JSON.parse(localStorage.getItem(TEXT_KEY) || '[]'); } catch { return []; }
      }
      function saveText(e) { localStorage.setItem(TEXT_KEY, JSON.stringify(e)); }

      function loadDocs() {
        try { return JSON.parse(localStorage.getItem(DOCS_KEY) || '[]'); } catch { return []; }
      }
      function saveDocs(d) { localStorage.setItem(DOCS_KEY, JSON.stringify(d)); }

      /* ── Render ── */
      function render() {
        renderText();
        renderDocs();
      }

      function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      function renderText() {
        const entries = loadText();
        const list = document.getElementById('torah-list');
        if (entries.length === 0) {
          list.innerHTML = `
            <div class="torah-placeholder">
              <div class="placeholder-icon">✦</div>
              <p>לחץ על הכפתורים למעלה כדי להוסיף</p>
            </div>`;
          return;
        }
        list.innerHTML = entries.map((e, i) => `
          <article class="torah-entry">
            <button class="btn-delete" onclick="deleteText(${i})" title="מחק">✕</button>
            <h2 class="torah-title">${escHtml(e.title)}</h2>
            ${e.meta ? `<p class="torah-meta">${escHtml(e.meta)}</p>` : ''}
            <div class="torah-body">
              ${e.body.split('\n').filter(l => l.trim()).map(l => `<p>${escHtml(l)}</p>`).join('')}
            </div>
          </article>
        `).join('');
      }

      function renderDocs() {
        const docs = loadDocs();
        const section = document.getElementById('docs-section');
        const list = document.getElementById('docs-list');
        if (docs.length === 0) { section.style.display = 'none'; return; }
        section.style.display = 'block';
        list.innerHTML = docs.map((d, i) => {
          const ext = d.filename ? d.filename.split('.').pop().toLowerCase() : 'pdf';
          const icon = ext === 'pdf' ? '📕' : '📘';
          return `
            <div class="doc-entry">
              <button class="btn-delete" onclick="deleteDoc(${i})" title="מחק">✕</button>
              <div class="doc-icon">${icon}</div>
              <div class="doc-info">
                <div class="doc-title">${escHtml(d.title)}</div>
                ${d.meta ? `<div class="doc-meta">${escHtml(d.meta)}</div>` : ''}
              </div>
              <a class="btn-download" href="${d.data}" download="${escHtml(d.filename || d.title)}">⬇ הורד</a>
            </div>`;
        }).join('');
      }

      /* ── Password check ── */
      function checkPassword() {
        const pw = prompt('הכנס סיסמה:');
        if (pw === 'Torah613') return true;
        if (pw !== null) alert('סיסמה שגויה');
        return false;
      }

      /* ── Modals ── */
      function openTextModal() {
        if (!checkPassword()) return;
        document.getElementById('f-title').value = '';
        document.getElementById('f-meta').value = '';
        document.getElementById('f-body').value = '';
        document.getElementById('modal-text').classList.add('open');
        document.getElementById('f-title').focus();
      }

      function openDocModal() {
        if (!checkPassword()) return;
        document.getElementById('d-title').value = '';
        document.getElementById('d-meta').value = '';
        document.getElementById('d-file').value = '';
        document.getElementById('file-name').style.display = 'none';
        document.getElementById('file-name').textContent = '';
        document.getElementById('modal-doc').classList.add('open');
      }

      function closeModal(id) {
        document.getElementById(id).classList.remove('open');
      }

      /* ── File picker feedback ── */
      function onFileChosen(input) {
        const nameEl = document.getElementById('file-name');
        if (input.files && input.files[0]) {
          nameEl.textContent = '✓ ' + input.files[0].name;
          nameEl.style.display = 'block';
        }
      }

      /* ── Save text ── */
      function saveTextEntry() {
        const title = document.getElementById('f-title').value.trim();
        const meta  = document.getElementById('f-meta').value.trim();
        const body  = document.getElementById('f-body').value.trim();
        if (!title || !body) { alert('נא למלא כותרת ותוכן.'); return; }
        const entries = loadText();
        entries.unshift({ title, meta, body });
        saveText(entries);
        closeModal('modal-text');
        render();
      }

      /* ── Save document ── */
      function saveDocEntry() {
        const title = document.getElementById('d-title').value.trim();
        const meta  = document.getElementById('d-meta').value.trim();
        const file  = document.getElementById('d-file').files[0];
        if (!title) { alert('נא למלא שם מסמך.'); return; }
        if (!file)  { alert('נא לבחור קובץ.'); return; }
        if (file.size > 4 * 1024 * 1024) { alert('הקובץ גדול מדי (מקסימום 4MB). אנא דחוס אותו ונסה שוב.'); return; }

        const reader = new FileReader();
        reader.onload = function(e) {
          const docs = loadDocs();
          docs.unshift({ title, meta, filename: file.name, data: e.target.result });
          try {
            saveDocs(docs);
            closeModal('modal-doc');
            render();
          } catch(err) {
            alert('הקובץ גדול מדי לשמירה. אנא נסה קובץ קטן יותר.');
          }
        };
        reader.readAsDataURL(file);
      }

      /* ── Download Torah entries ── */
      function downloadTorahEntries() {
        if (!checkPassword()) return;
        const entries = loadText();
        if (entries.length === 0) { alert('אין דברי תורה להורדה.'); return; }
        const lines = entries.map(e =>
          `${e.title}\n${e.meta ? e.meta + '\n' : ''}${'─'.repeat(40)}\n${e.body}\n`
        ).join('\n\n');
        const content = `דברי תורה — הרב ד"ר עו"ד אשר טרגין\n${'═'.repeat(40)}\n\n${lines}`;
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'divrei-torah.txt';
        a.click();
        URL.revokeObjectURL(url);
      }

      /* ── Delete ── */
      function deleteText(i) {
        if (!confirm('למחוק את הדבר תורה הזה?')) return;
        const e = loadText(); e.splice(i, 1); saveText(e); render();
      }
      function deleteDoc(i) {
        if (!confirm('למחוק את המסמך הזה?')) return;
        const d = loadDocs(); d.splice(i, 1); saveDocs(d); render();
      }

      /* Close on overlay click */
      ['modal-text','modal-doc'].forEach(id => {
        document.getElementById(id).addEventListener('click', function(e) {
          if (e.target === this) closeModal(id);
        });
      });

      /* Drag feedback */
      const zone = document.getElementById('file-zone');
      zone.addEventListener('dragover', () => zone.classList.add('drag'));
      zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
      zone.addEventListener('drop', () => zone.classList.remove('drag'));

      render();
    </script>
  </body>
</html>
