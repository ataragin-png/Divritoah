<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>דברי תורה — אשר טרגין</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700&family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="cv.css" />
    <style>
      /* ── Filter bar ── */
      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-bottom: 36px;
      }
      .filter-btn {
        padding: 7px 18px;
        border-radius: 20px;
        border: 1.5px solid var(--border);
        background: transparent;
        color: var(--ink-muted);
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
      .filter-btn.active {
        background: var(--gold);
        border-color: var(--gold);
        color: #fff;
      }

      /* ── Entry cards ── */
      .torah-grid { display: flex; flex-direction: column; gap: 12px; }

      .torah-card {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 18px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fff;
        transition: box-shadow 0.2s;
      }
      .torah-card:hover { box-shadow: 0 2px 12px rgba(184,134,58,0.12); }

      .card-icon { font-size: 26px; flex-shrink: 0; }

      .card-info { flex: 1; min-width: 0; }
      .card-title {
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 17px;
        font-weight: 500;
        color: var(--ink);
        margin-bottom: 3px;
      }
      .card-meta { font-size: 13px; color: var(--ink-muted); }
      .card-cat {
        display: inline-block;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        background: rgba(184,134,58,0.1);
        color: var(--gold);
        margin-top: 4px;
      }

      .btn-view {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: transparent;
        border: 1.5px solid var(--gold);
        color: var(--gold);
        border-radius: 4px;
        padding: 8px 18px;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s;
        flex-shrink: 0;
        white-space: nowrap;
      }
      .btn-view:hover { background: rgba(184,134,58,0.08); }

      /* ── Empty state ── */
      .empty-state {
        text-align: center;
        padding: 60px 24px;
        color: var(--ink-muted);
        font-family: 'Frank Ruhl Libre', serif;
      }
      .empty-icon { font-size: 36px; opacity: 0.4; margin-bottom: 14px; }
      .empty-state p { font-size: 18px; }
      .empty-state .sub { font-size: 14px; margin-top: 6px; }

      /* ── Admin link ── */
      .admin-bar {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 32px;
      }
      .btn-admin {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--gold);
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 11px 26px;
        font-family: 'Frank Ruhl Libre', serif;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 2px 10px rgba(184,134,58,0.25);
        transition: background 0.2s;
      }
      .btn-admin:hover { background: var(--gold-light); }
      .btn-admin-outline {
        background: transparent;
        color: var(--gold);
        border: 1.5px solid var(--gold);
        box-shadow: none;
      }
      .btn-admin-outline:hover { background: rgba(184,134,58,0.08); }
      .admin-only-btn { display: none; }
      body.admin-mode .admin-only-btn { display: inline-flex; }

      /* ── Admin mode toggle in nav ── */
      .btn-admin-mode {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 15px;
        color: var(--border);
        padding: 4px 6px;
        border-radius: 4px;
        transition: color 0.2s;
        line-height: 1;
      }
      .btn-admin-mode:hover { color: var(--gold); }
      body.admin-mode .btn-admin-mode { color: var(--gold); }

      .admin-mode-badge {
        display: none;
        font-size: 11px;
        color: var(--gold);
        font-family: 'Frank Ruhl Libre', serif;
        border: 1px solid var(--gold);
        border-radius: 10px;
        padding: 1px 8px;
        margin-right: 6px;
        vertical-align: middle;
      }
      body.admin-mode .admin-mode-badge { display: inline; }

      /* ── Remove button — hidden until admin mode ── */
      .btn-remove {
        display: none;
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
        color: var(--border);
        padding: 4px 6px;
        border-radius: 4px;
        transition: color 0.2s, background 0.2s;
        flex-shrink: 0;
      }
      body.admin-mode .btn-remove { display: inline-flex; align-items: center; }
      .btn-remove:hover { color: #c0392b; background: rgba(192,57,43,0.08); }

      @media (max-width: 520px) {
        .torah-card { flex-wrap: wrap; }
        .btn-view { width: 100%; justify-content: center; }
      }
    </style>
  </head>
  <body>
    <div class="bg-texture"></div>

    <header class="site-header">
      <nav>
        <a href="index.html" class="back-link">← חזרה</a>
        <span class="nav-name">
          <span class="admin-mode-badge">ניהול</span>
          א.ט
          <button class="btn-admin-mode" onclick="toggleAdminMode()" title="מצב ניהול">🔑</button>
        </span>
      </nav>
    </header>

    <main class="cv-main">
      <div class="cv-container">

        <div class="cv-header">
          <div class="photo-frame">
            <img src="photo.jpg" alt="אשר טרגין" class="hero-photo" />
          </div>
          <h1 class="cv-name">דברי תורה</h1>
          <p class="cv-name-en">Torah Teachings</p>
          <div class="divider"></div>
          <p class="cv-meta">הרב ד"ר עו"ד אשר טרגין</p>
        </div>

        <!-- Admin publish button -->
        <div class="admin-bar">
          <a href="/admin" class="btn-admin admin-only-btn">✍️ פרסם דבר תורה חדש</a>
          <button class="btn-admin btn-admin-outline" onclick="filter('הכל'); document.getElementById('torah-grid').scrollIntoView({behavior:'smooth'})">📚 כל הדברי תורה</button>
        </div>

        <!-- Category filter -->
        <div class="filter-bar" id="filter-bar">
          <button class="filter-btn active" onclick="filter('הכל')">הכל</button>
          <button class="filter-btn" onclick="filter('פרשת השבוע')">פרשת השבוע</button>
          <button class="filter-btn" onclick="filter('מועדים וזמנים')">מועדים וזמנים</button>
          <button class="filter-btn" onclick="filter('רפואה והלכה')">רפואה והלכה</button>
          <button class="filter-btn" onclick="filter('אמונה והשקפה')">אמונה והשקפה</button>
          <button class="filter-btn" onclick="filter('הלכה ומשפט')">הלכה ומשפט</button>
          <button class="filter-btn" onclick="filter('ברית מילה')">ברית מילה</button>
          <button class="filter-btn" onclick="filter('דפי מקורות')">דפי מקורות</button>
        </div>

        <!-- Torah list -->
        <div class="torah-grid" id="torah-grid"></div>

      </div>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Asher Taragin</p>
    </footer>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();

      // ── FILES array — each entry added here by the admin tool ──
      const FILES = [
  { title: "אונאת הגר בזמן תהליך הגיור", meta: "הרב אשר טרגין · פורסם בתחומין כרך מב", file: "files/onaat-hager-techumin.pdf", category: "הלכה ומשפט" },
  { title: "מתן אופיאטים כטיפול בקוצר נשימה בחולה הנוטה למות", meta: "ד\"ר אשר טרגין וד\"ר מאיר פרנקל · עתיד להתפרסם בכתב העת אסיא", file: "files/morphine-dyspnea-assia.pdf", category: "רפואה והלכה" },
  { title: "המתת חסד — היבטים הלכתיים, משפטיים ורפואיים", meta: "דף מקורות · רפואה והלכה", file: "files/euthanasia-sources.pdf", category: "דפי מקורות" },
  { title: "הפריה חוץ גופית והלכה", meta: "דף מקורות · רפואה והלכה", file: "files/ivf-halacha-sources.pdf", category: "דפי מקורות" },
  { title: "מקורות תורניים על קעקוע", meta: "דף מקורות", file: "files/tattoo-sources.pdf", category: "דפי מקורות" },
  { title: "ראיית פני ה'", meta: "דבר תורה לשבת חול המועד פסח", file: "files/reiyat-pnei-hashem.pdf", category: "מועדים וזמנים" },
  { title: "רפואה ואמונה", meta: "חיזוק האמונה ואהבת ה' דרך עולם הרפואה", file: "files/refua-veemuna.pdf", category: "אמונה והשקפה" },
      ];

      let activeFilter = 'הכל';

      function filter(cat) {
        activeFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.toggle('active', btn.textContent.trim() === cat);
        });
        render();
      }

      function render() {
        const grid = document.getElementById('torah-grid');
        const list = activeFilter === 'הכל'
          ? FILES
          : FILES.filter(e => e.category === activeFilter);

        if (list.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">✦</div>
              <p>${activeFilter === 'הכל' ? 'דברי תורה יתווספו בקרוב' : 'אין דברי תורה בקטגוריה זו'}</p>
              <p class="sub">Torah teachings coming soon</p>
            </div>`;
          return;
        }

        grid.innerHTML = list.map(e => `
          <div class="torah-card">
            <div class="card-icon">📕</div>
            <div class="card-info">
              <div class="card-title">${esc(e.title)}</div>
              ${e.meta ? `<div class="card-meta">${esc(e.meta)}</div>` : ''}
              ${e.category ? `<span class="card-cat">${esc(e.category)}</span>` : ''}
            </div>
            <a class="btn-view" href="${esc(e.file)}" target="_blank" rel="noopener">📖 פתח</a>
            <button class="btn-remove" onclick="removeEntry('${e.file.replace(/'/g,"\\'")}', '${esc(e.title).replace(/'/g,"\\'")}')">🗑</button>
          </div>
        `).join('');
      }

      function toggleAdminMode() {
        if (document.body.classList.contains('admin-mode')) {
          document.body.classList.remove('admin-mode');
          sessionStorage.removeItem('adminMode');
          return;
        }
        const pw = prompt('הכנס סיסמת ניהול:');
        if (!pw) return;
        if (pw !== 'Torah613') { alert('❌ סיסמה שגויה'); return; }
        document.body.classList.add('admin-mode');
        sessionStorage.setItem('adminMode', '1');
      }

      // Restore admin mode if set in this session
      if (sessionStorage.getItem('adminMode') === '1') {
        document.body.classList.add('admin-mode');
      }

      async function removeEntry(filePath, title) {
        const pw = prompt('הכנס סיסמה להסרת הדבר תורה:');
        if (!pw) return;
        if (!confirm(`האם להסיר את "${title}"?`)) return;
        try {
          const fd = new FormData();
          fd.append('password', pw);
          fd.append('file', filePath);
          const r = await fetch('/api/remove', { method: 'POST', body: fd });
          const data = await r.json();
          if (data.success) {
            alert('✅ הדבר תורה הוסר בהצלחה!\nהאתר יתעדכן תוך 1–2 דקות.');
          } else {
            alert('❌ ' + data.error);
          }
        } catch(e) {
          alert('❌ שגיאת רשת — נסה שוב');
        }
      }

      function esc(s) {
        return String(s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      render();
    </script>
  </body>
</html>
